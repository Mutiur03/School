name: Deploy Frontend

on:
  push:
    branches: ["main"]
    paths:
      - "client/**"
      - "dashboard/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: LBP Dashboard
            directory: dashboard
            workspace: dashboard
            build_script: build
            project_name: lbp-dashboard
            env_file: .env.production.local
            same_origin_backend: true
          - name: LBP Admin
            directory: dashboard
            workspace: dashboard
            build_script: build:admin
            project_name: lbp-admin
            env_file: .env.admin.local
            default_role: admin
          - name: LBP Teacher
            directory: dashboard
            workspace: dashboard
            build_script: build:teacher
            project_name: lbp-teacher
            env_file: .env.teacher.local
            default_role: teacher
          - name: LBP Student
            directory: dashboard
            workspace: dashboard
            build_script: build:student
            project_name: lbp-student
            env_file: .env.student.local
            default_role: student
          - name: LBP Client
            directory: client
            workspace: client
            build_script: build
            project_name: lbp-client
            env_file: .env.production.local
            same_origin_backend: true
          - name: Super admin
            directory: dashboard
            workspace: dashboard
            build_script: build:super_admin
            project_name: school-superadmin
            env_file: .env.super_admin.local
            default_role: super_admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Install workspace dependencies
        run: npm ci --include=optional --ignore-scripts=false --no-audit --no-fund

      - name: Build shared packages
        run: |
          npm run build -w @school/shared-schemas
          npm run build -w @school/common-ui
          npm run build -w @school/client-ui

      - name: Write production env for ${{ matrix.app.name }}
        run: |
          {
            if [ "${{ matrix.app.same_origin_backend }}" = "true" ]; then
              echo "VITE_BACKEND_URL="
            else
              echo "VITE_BACKEND_URL=${{ secrets.LBP_VITE_BACKEND_URL }}"
            fi
            echo "VITE_CDN_URL=${{ secrets.LBP_VITE_CDN_URL }}"
            if [ -n "${{ matrix.app.default_role }}" ]; then
              echo "VITE_DEFAULT_ROLE=${{ matrix.app.default_role }}"
            fi
          } > ./${{ matrix.app.directory }}/${{ matrix.app.env_file }}

      - name: Build ${{ matrix.app.name }}
        run: npm run ${{ matrix.app.build_script }} -w ${{ matrix.app.workspace }}

      - name: Deploy ${{ matrix.app.name }}
        run: npx wrangler pages deploy ./${{ matrix.app.directory }}/dist --project-name=${{ matrix.app.project_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
