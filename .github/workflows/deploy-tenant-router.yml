name: Deploy Tenant Router

on:
  push:
    branches: ["main"]
    paths:
      - "workers/tenant-router/**"
      - ".github/workflows/deploy-tenant-router.yml"
  workflow_dispatch:

concurrency:
  group: tenant-router-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/tenant-router/package.json

      - name: Install worker dependencies
        run: npm install --prefix workers/tenant-router --include=optional --ignore-scripts=false --no-audit --no-fund

      - name: Dry run
        run: npx --prefix workers/tenant-router wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy worker
        run: npx --prefix workers/tenant-router wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
