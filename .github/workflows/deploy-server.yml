name: Deploy Server

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - "packages/shared-schemas/**"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub (To prevent rate limits)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stable scope so Chromium/apt layer + BuildKit caches reuse across pushes (not mixed with other workflows).
          cache-from: type=gha,scope=school-server
          cache-to: type=gha,mode=max,scope=school-server

  prepare-server:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Prepare server and pull image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          script: |
            set -e

            # Disk space and Docker cleanup (once for both deployments)
            echo "Checking disk space..."
            df -h
            echo "Aggressive cleanup..."
            docker system prune -a -f

            # Login to GHCR (once for both deployments)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Get image name (lowercased repository)
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_NAME="ghcr.io/$REPO:latest"

            echo "Pulling image: $IMAGE_NAME"
            docker pull $IMAGE_NAME

            # Tag for compose
            docker tag $IMAGE_NAME school_backend:latest

            # Cleanup old images
            docker image prune -f

