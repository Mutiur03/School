<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Logs | School Server</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --text-dim: #94a3b8;
        --primary: #38bdf8;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --border: #334155;
      }

      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 2rem;
        line-height: 1.5;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0;
        background: linear-gradient(to right, var(--primary), #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        padding: 1rem;
        border-radius: 0.75rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .stat-label {
        font-size: 0.875rem;
        color: var(--text-dim);
      }
      .stat-value {
        font-size: 1.25rem;
        font-weight: 600;
        font-family: "JetBrains Mono", monospace;
      }

      .log-table-container {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        overflow: hidden;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
        text-align: left;
      }

      th {
        background: #1e293b;
        padding: 0.75rem 1rem;
        font-weight: 500;
        color: var(--text-dim);
        border-bottom: 1px solid var(--border);
      }

      td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        font-family: "JetBrains Mono", monospace;
      }

      tr:last-child td {
        border-bottom: none;
      }
      tr:hover {
        background: #33415544;
      }

      .method {
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        font-weight: 600;
        font-size: 0.75rem;
        text-transform: uppercase;
      }

      .GET {
        color: var(--success);
        background: #22c55e22;
      }
      .POST {
        color: var(--primary);
        background: #38bdf822;
      }
      .PUT,
      .PATCH {
        color: var(--warning);
        background: #f59e0b22;
      }
      .DELETE {
        color: var(--danger);
        background: #ef444422;
      }

      .status {
        font-weight: 600;
      }
      .status-2xx {
        color: var(--success);
      }
      .status-3xx {
        color: var(--primary);
      }
      .status-4xx {
        color: var(--warning);
      }
      .status-5xx {
        color: var(--danger);
      }

      .badge {
        font-size: 0.75rem;
        padding: 0.125rem 0.375rem;
        border-radius: 9999px;
        background: #334155;
        color: var(--text-dim);
      }

      .refresh-btn {
        background: var(--primary);
        color: #000;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .refresh-btn:hover {
        opacity: 0.9;
        transform: scale(0.98);
      }

      .loading {
        padding: 2rem;
        text-align: center;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Request Log Viewer</h1>
        <button class="refresh-btn" onclick="fetchLogs()">Refresh Logs</button>
      </header>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total Requests (View)</div>
          <div class="stat-value" id="total-req">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Duration</div>
          <div class="stat-value" id="avg-duration">0 ms</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Error Rate</div>
          <div class="stat-value" id="error-rate">0%</div>
        </div>
      </div>

      <div class="log-table-container">
        <table id="log-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Method</th>
              <th>Path</th>
              <th>Code</th>
              <th>Duration</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody id="log-body">
            <tr>
              <td colspan="6" class="loading">Fetching recent requests...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      async function fetchLogs() {
        const body = document.getElementById("log-body");
        try {
          const response = await fetch("/api/monitoring/recent-requests");

          if (response.status === 401 || response.status === 403) {
            throw new Error(
              "Authentication failed. Please log in as an administrator.",
            );
          }

          const data = await response.json();
          if (!data.success) throw new Error(data.message);

          const logs = data.logs;
          body.innerHTML = "";
          allLogs = [...logs];

          logs.forEach((log) => addLogRow(log, false));
          updateStats(logs);
        } catch (err) {
          body.innerHTML = `<tr><td colspan="6" class="loading" style="color:red">Error: ${err.message}</td></tr>`;
        }
      }

      function addLogRow(log, prepend = true) {
        const body = document.getElementById("log-body");
        const status = log.status || 0;
        const timestamp = log.timestamp || "";
        const method = log.method || "???";
        const url = log.url || "???";
        const duration = log.duration_ms || 0;
        const ip = log.ip || "???";

        const row = document.createElement("tr");
        const statusClass = `status-${status.toString()[0]}xx`;

        row.innerHTML = `
                <td>${timestamp.includes(" ") || timestamp.includes("T") ? (timestamp.includes("T") ? timestamp.split("T")[1].split(".")[0] : timestamp.split(" ")[1]) : timestamp}</td>
                <td><span class="method ${method}">${method}</span></td>
                <td>${url}</td>
                <td class="status ${statusClass}">${status}</td>
                <td>${duration}ms</td>
                <td><span class="badge">${ip}</span></td>
            `;

        if (prepend && body.firstChild) {
          body.insertBefore(row, body.firstChild);
          // Keep only last 50
          if (body.children.length > 50) body.removeChild(body.lastChild);
        } else {
          body.appendChild(row);
        }
      }

      function updateStats(logs) {
        let totalTime = 0;
        let errors = 0;
        logs.forEach((log) => {
          totalTime += log.duration_ms || 0;
          if (log.status >= 400) errors++;
        });

        document.getElementById("total-req").textContent = logs.length;
        document.getElementById("avg-duration").textContent =
          (totalTime / logs.length || 0).toFixed(2) + " ms";
        document.getElementById("error-rate").textContent =
          ((errors / logs.length) * 100 || 0).toFixed(1) + "%";
      }

      // Initialize
      fetchLogs();

      // SSE for real-time updates
      let allLogs = [];
      const evtSource = new EventSource("/api/monitoring/logs/stream");
      evtSource.onmessage = function (event) {
        const log = JSON.parse(event.data);
        addLogRow(log, true);
        allLogs.unshift(log);
        if (allLogs.length > 100) allLogs.pop();
        updateStats([...allLogs]);
      };
      evtSource.onerror = function () {
        console.error("SSE connection lost");
      };
    </script>
  </body>
</html>
